<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#FBF5E6"/>
      <stop offset="60%" stop-color="#F5EDD8"/>
      <stop offset="100%" stop-color="#E4D4A8"/>
    </radialGradient>
    <linearGradient id="saffron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E87820"/>
      <stop offset="100%" stop-color="#B84E00"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="250" fill="#C45C00"/>
  <circle cx="256" cy="256" r="242" fill="url(#bg)"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#C45C00" stroke-width="1.5" opacity="0.2"/>

  <!-- Large Om symbol using Unicode -->
  <text x="256" y="310" text-anchor="middle" dominant-baseline="central" font-size="280" fill="url(#saffron)" font-family="serif">ॐ</text>

  <!-- "द" initial at bottom -->
  <text x="256" y="440" text-anchor="middle" font-size="40" fill="#8B1A1A" font-family="serif" font-weight="bold" opacity="0.65">द</text>
</svg>
