<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#F5EDD8"/>
      <stop offset="100%" stop-color="#E4D4A8"/>
    </radialGradient>
    <linearGradient id="saffron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E87820"/>
      <stop offset="100%" stop-color="#C45C00"/>
    </linearGradient>
    <linearGradient id="crimson" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#C45C00" stroke-width="8"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="rgba(196,92,0,0.2)" stroke-width="2"/>

  <!-- Decorative border dots -->
  <g fill="#C45C00" opacity="0.4">
    <circle cx="256" cy="28" r="4"/>
    <circle cx="256" cy="484" r="4"/>
    <circle cx="28" cy="256" r="4"/>
    <circle cx="484" cy="256" r="4"/>
    <circle cx="95" cy="95" r="3"/>
    <circle cx="417" cy="95" r="3"/>
    <circle cx="95" cy="417" r="3"/>
    <circle cx="417" cy="417" r="3"/>
  </g>

  <!-- Central Trident (Trishul) — representing Vedic heritage -->
  <g filter="url(#glow)">
    <!-- Shaft -->
    <rect x="249" y="180" width="14" height="220" rx="7" fill="url(#saffron)"/>

    <!-- Center prong -->
    <path d="M256 100 L248 180 L264 180 Z" fill="url(#saffron)"/>
    <!-- Center tip flame -->
    <ellipse cx="256" cy="96" rx="10" ry="14" fill="#E87820" opacity="0.9"/>
    <ellipse cx="256" cy="88" rx="6" ry="10" fill="#FBBF24" opacity="0.8"/>

    <!-- Left prong -->
    <path d="M210 140 Q220 175 248 185 L244 175 Q225 168 218 145 Z" fill="url(#saffron)"/>
    <ellipse cx="208" cy="134" rx="8" ry="12" fill="#E87820" opacity="0.8" transform="rotate(-15 208 134)"/>

    <!-- Right prong -->
    <path d="M302 140 Q292 175 264 185 L268 175 Q287 168 294 145 Z" fill="url(#saffron)"/>
    <ellipse cx="304" cy="134" rx="8" ry="12" fill="#E87820" opacity="0.8" transform="rotate(15 304 134)"/>

    <!-- Crossbar -->
    <rect x="218" y="178" width="76" height="8" rx="4" fill="url(#saffron)"/>
  </g>

  <!-- Om symbol below trident -->
  <text x="256" y="360" text-anchor="middle" font-size="64" fill="url(#crimson)" font-family="serif" opacity="0.9">ॐ</text>

  <!-- "द" Devanagari initial at bottom -->
  <text x="256" y="440" text-anchor="middle" font-size="52" fill="#C45C00" font-family="serif" font-weight="bold" opacity="0.85">द</text>
</svg>
